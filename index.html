<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Master Pro</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 800px; }

        /* Formulário Elaborado */
        .form-card {
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-card h2 { grid-column: 1 / -1; margin-top: 0; }

        input, select, button {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .full-width { grid-column: 1 / -1; }

        button {
            background: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #4f46e5; transform: translateY(-2px); }

        /* Organização por Dias (Quadrados) */
        .agenda-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .dia-section {
            background: #e5e7eb;
            padding: 15px;
            border-radius: 12px;
            min-height: 200px;
        }

        .dia-titulo {
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Card de Tarefa Individual */
        .tarefa-card {
            background: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 5px solid #ccc;
            position: relative;
        }

        .prioridade-alta { border-left-color: #ef4444; }
        .prioridade-media { border-left-color: #f59e0b; }
        .prioridade-baixa { border-left-color: #10b981; }

        .tarefa-header { display: flex; align-items: center; gap: 8px; font-weight: 600; }
        
        .tarefa-foto {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 6px;
            margin-top: 8px;
        }

        .hora-tag {
            font-size: 0.75rem;
            background: #f3f4f6;
            padding: 2px 6px;
            border-radius: 4px;
            color: #666;
        }

        .btn-excluir {
            background: #fee2e2;
            color: #ef4444;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            float: right;
            cursor: pointer;
        }

        .concluida { opacity: 0.5; text-decoration: line-through; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <h2>🚀 Nova Atividade</h2>
        <input type="text" id="nome" placeholder="O que fazer?" class="full-width">
        <input type="text" id="emoji" placeholder="Emoji (ex: 💻, 🍎, 🏋️)">
        <select id="prioridade">
            <option value="alta">Prioridade Alta</option>
            <option value="media">Prioridade Média</option>
            <option value="baixa">Prioridade Baixa</option>
        </select>
        <input type="date" id="data">
        <input type="time" id="hora">
        <input type="file" id="foto" accept="image/*" class="full-width">
        <button onclick="adicionarTarefa()" class="full-width">Agendar na Minha Vida</button>
    </div>

    <div id="agendaDisplay" class="agenda-grid">
        <!-- Os dias e tarefas aparecerão aqui -->
    </div>
</div>

<script>
    let tarefas = [];

    // Pedir permissão para notificações ao carregar
    if (Notification.permission !== "granted") {
        Notification.requestPermission();
    }

    function adicionarTarefa() {
        const nome = document.getElementById('nome').value;
        const emoji = document.getElementById('emoji').value || '📝';
        const data = document.getElementById('data').value;
        const hora = document.getElementById('hora').value;
        const prioridade = document.getElementById('prioridade').value;
        const fotoInput = document.getElementById('foto');

        if (!nome || !data || !hora) return alert("Preencha o básico!");

        const leitor = new FileReader();
        
        // Se houver foto, lê a imagem antes de salvar
        if (fotoInput.files[0]) {
            leitor.readAsDataURL(fotoInput.files[0]);
            leitor.onload = () => salvarTarefa(nome, emoji, data, hora, prioridade, leitor.result);
        } else {
            salvarTarefa(nome, emoji, data, hora, prioridade, null);
        }
    }

    function salvarTarefa(nome, emoji, data, hora, prioridade, fotoBase64) {
        const nova = {
            id: Date.now(),
            nome, emoji, data, hora, prioridade, foto: fotoBase64, concluida: false
        };

        tarefas.push(nova);
        enviarNotificacao(nome);
        renderizar();
        
        // Limpa campos
        document.getElementById('nome').value = "";
        document.getElementById('foto').value = "";
    }

    function enviarNotificacao(titulo) {
        if (Notification.permission === "granted") {
            new Notification("Agenda Master", {
                body: `Tarefa "${titulo}" adicionada com sucesso!`,
                icon: "https://cdn-icons-png.flaticon.com/512/1069/1069159.png"
            });
        }
    }

    function renderizar() {
        const display = document.getElementById('agendaDisplay');
        display.innerHTML = "";

        // 1. Agrupar tarefas por data
        const grupos = {};
        tarefas.sort((a,b) => (a.hora > b.hora ? 1 : -1)); // Ordena por hora interna

        tarefas.forEach(t => {
            if (!grupos[t.data]) grupos[t.data] = [];
            grupos[t.data].push(t);
        });

        // 2. Ordenar as datas (dias)
        const datasOrdenadas = Object.keys(grupos).sort();

        datasOrdenadas.forEach(data => {
            const secao = document.createElement('div');
            secao.className = 'dia-section';
            
            const dataBr = data.split('-').reverse().join('/');
            secao.innerHTML = `<div class="dia-titulo"><span>📅 ${dataBr}</span></div>`;

            grupos[data].forEach(t => {
                const card = document.createElement('div');
                card.className = `tarefa-card prioridade-${t.prioridade} ${t.concluida ? 'concluida' : ''}`;
                
                card.innerHTML = `
                    <button class="btn-excluir" onclick="excluir(${t.id})">🗑️</button>
                    <div class="tarefa-header" onclick="alternar(${t.id})">
                        <span>${t.emoji}</span>
                        <span>${t.nome}</span>
                    </div>
                    <span class="hora-tag">⏰ ${t.hora}</span>
                    ${t.foto ? `<img src="${t.foto}" class="tarefa-foto">` : ''}
                `;
                secao.appendChild(card);
            });

            display.appendChild(secao);
        });
    }

    function excluir(id) {
        tarefas = tarefas.filter(t => t.id !== id);
        renderizar();
    }

    function alternar(id) {
        tarefas = tarefas.map(t => t.id === id ? {...t, concluida: !t.concluida} : t);
        renderizar();
    }
</script>

</body>
</html>
